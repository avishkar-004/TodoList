<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      width: 90%;
      max-width: 400px;
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    h1 { font-size: 24px; color: #333; }
    .input-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }
    button {
      padding: 10px 15px;
      border: none;
      background-color: #5cb85c;
      color: #fff;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background-color: #4cae4c; }
    #taskList { list-style: none; padding: 0; margin: 0; }
    .task {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      margin-bottom: 10px;
      background-color: #f9f9f9;
      border-radius: 5px;
      border: 1px solid #ddd;
    }
    .task span { flex: 1; font-size: 16px; word-break: break-word; }
    .task button {
      border: none;
      background-color: #d9534f;
      color: #fff;
      padding: 5px 10px;
      font-size: 14px;
      border-radius: 5px;
      cursor: pointer;
    }
    .task button:hover { background-color: #c9302c; }
  </style>
</head>
<body>
  <div class="container">
    <h1>To-Do List</h1>
    <div class="input-container">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button id="addTaskButton">Add</button>
    </div>
    <ul id="taskList"></ul>
  </div>
  <script>
    var taskInput = document.getElementById('taskInput');
    var addBtn = document.getElementById('addTaskButton');
    var taskList = document.getElementById('taskList');

    addBtn.addEventListener('click', function() {
      var text = taskInput.value.trim();
      if (text === '') { alert('Please enter a task.'); return; }
      var li = document.createElement('li');
      li.className = 'task';
      var span = document.createElement('span');
      span.textContent = text;
      var del = document.createElement('button');
      del.textContent = 'Delete';
      del.addEventListener('click', function() {
        li.remove();
        saveTasks();
      });
      li.appendChild(span);
      li.appendChild(del);
      taskList.appendChild(li);
      taskInput.value = '';
      saveTasks();
    });

    taskInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') addBtn.click();
    });

    function saveTasks() {
      var tasks = [];
      document.querySelectorAll('.task span').forEach(function(s) {
        tasks.push(s.textContent);
      });
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function loadTasks() {
      var tasks = JSON.parse(localStorage.getItem('tasks')) || [];
      tasks.forEach(function(text) {
        var li = document.createElement('li');
        li.className = 'task';
        var span = document.createElement('span');
        span.textContent = text;
        var del = document.createElement('button');
        del.textContent = 'Delete';
        del.addEventListener('click', function() {
          li.remove();
          saveTasks();
        });
        li.appendChild(span);
        li.appendChild(del);
        taskList.appendChild(li);
      });
    }

    loadTasks();
  </script>
</body>
</html>
