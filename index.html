<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Todo List</h1>
      <button id="themeToggle" class="theme-btn">Dark Mode</button>
    </div>
    <div class="input-container">
      <input type="text" id="taskInput" placeholder="Add a new task...">
      <button id="addBtn">Add</button>
    </div>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search tasks...">
    </div>
    <div class="stats">
      <span id="totalCount">Total: 0</span>
      <span id="completedCount">Done: 0</span>
      <span id="pendingCount">Pending: 0</span>
    </div>
    <div class="filter-container">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>
    <ul id="taskList"></ul>
    <div class="actions">
      <button id="clearCompleted" class="btn-clear">Clear Completed</button>
      <button id="clearAll" class="btn-danger">Clear All</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
